monitors:
  - name: "eDP-1"               # Exact Sway output name
    anchor: ["bottom", "right"] # Position on screen
    margin: [30, 30]            # [vertical, horizontal] margins in px
    scale: 1.2                  # Per-monitor scaling of font
    refresh_interval: 60        # Update interval in seconds

    parts:
      - name: "time"
        format: "%H:%M"
      - name: "date"
        format: "%Y-%m-%d"

  - name: "default"             # Fallback for other monitors
    anchor: ["top", "left"]
    margin: [10, 10]
    scale: 1.0
    refresh_interval: 5.0

    parts:
      - name: "time"
        format: "%H:%M"

css_path: "style.css"           # Path to the CSS file